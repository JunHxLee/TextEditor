name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Android SDK 경로 설정
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: APK 빌드 (Debug)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            ERROR_MSG=$(tail -200 /tmp/build_output.txt)
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "Build Error Report (Run #${{ github.run_number }})" \
              --body "## Build Error (exit code: $BUILD_EXIT)
Event: ${{ github.event_name }}, Branch: ${{ github.ref_name }}
\`\`\`
$ERROR_MSG
\`\`\`" || true
          fi
          exit $BUILD_EXIT

      - name: APK 빌드 (Release)
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Debug APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
