name: Build & Lint APK

on:
  push:
    branches: [ "main", "master", "claude/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  lint:
    name: Android Lint 검사
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Android SDK 경로 설정
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Android Lint 실행
        run: ./gradlew lintDebug

      - name: Lint 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  build:
    name: APK 빌드
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Android SDK 경로 설정
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: APK 빌드 (Debug)
        run: ./gradlew assembleDebug

      - name: APK 빌드 (Release)
        run: ./gradlew assembleRelease

      - name: Debug APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
