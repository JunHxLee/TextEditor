name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Android SDK 경로 설정
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: APK 빌드 (Debug)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_NUM: ${{ github.run_number }}
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set +e
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee /tmp/build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            python3 -c "
import json, urllib.request, os
token = os.environ['GH_TOKEN']
repo = os.environ['REPO']
run_num = os.environ['RUN_NUM']
event = os.environ['EVENT']
ref = os.environ['REF_NAME']
with open('/tmp/build_output.txt') as f:
    lines = f.readlines()
error_text = ''.join(lines[-150:])
body = 'Build Error (exit {})\nEvent: {}, Branch: {}\n\`\`\`\n{}\n\`\`\`'.format(os.environ.get('BUILD_EXIT','?'), event, ref, error_text)
payload = json.dumps({'title': 'Build Error Report (Run #{})'.format(run_num), 'body': body}).encode()
req = urllib.request.Request(
    'https://api.github.com/repos/{}/issues'.format(repo),
    data=payload,
    headers={'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'}
)
try:
    resp = urllib.request.urlopen(req)
    print('Issue created:', resp.read().decode()[:300])
except Exception as e:
    print('Failed:', e)
" BUILD_EXIT=$BUILD_EXIT || true
          fi
          exit $BUILD_EXIT

      - name: APK 빌드 (Release)
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Debug APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: TextEditor-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
